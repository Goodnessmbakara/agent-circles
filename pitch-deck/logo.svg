<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" fill="none">
  <!-- Agent Circles Logo — Mark + Wordmark -->

  <!-- MARK: Five nodes in a circle connected by a rotating arc path -->
  <!-- Represents the ROSCA: members connected in rotation -->
  <g transform="translate(120, 120)">
    <!-- Outer rotation arc (the "cycle") -->
    <path d="M 0 -72 A 72 72 0 1 1 -62.35 36" stroke="url(#arc-grad)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- Arrow head on the arc -->
    <polygon points="-62.35,36 -52,24 -70,22" fill="#4f8ff7"/>

    <!-- 5 member nodes positioned in a circle -->
    <!-- Node 1 (top) — highlighted as current recipient -->
    <circle cx="0" cy="-72" r="14" fill="#4f8ff7"/>
    <circle cx="0" cy="-72" r="7" fill="#0a0a0c"/>

    <!-- Node 2 -->
    <circle cx="68.5" cy="-22.2" r="11" fill="#9580ff" opacity="0.85"/>
    <circle cx="68.5" cy="-22.2" r="5.5" fill="#0a0a0c"/>

    <!-- Node 3 -->
    <circle cx="42.3" cy="58.2" r="11" fill="#9580ff" opacity="0.7"/>
    <circle cx="42.3" cy="58.2" r="5.5" fill="#0a0a0c"/>

    <!-- Node 4 -->
    <circle cx="-42.3" cy="58.2" r="11" fill="#9580ff" opacity="0.55"/>
    <circle cx="-42.3" cy="58.2" r="5.5" fill="#0a0a0c"/>

    <!-- Node 5 -->
    <circle cx="-68.5" cy="-22.2" r="11" fill="#9580ff" opacity="0.4"/>
    <circle cx="-68.5" cy="-22.2" r="5.5" fill="#0a0a0c"/>

    <!-- Inner connecting lines (showing the pool/pot flow) -->
    <line x1="0" y1="-72" x2="68.5" y2="-22.2" stroke="#4f8ff7" stroke-width="1.5" opacity="0.15"/>
    <line x1="68.5" y1="-22.2" x2="42.3" y2="58.2" stroke="#4f8ff7" stroke-width="1.5" opacity="0.15"/>
    <line x1="42.3" y1="58.2" x2="-42.3" y2="58.2" stroke="#4f8ff7" stroke-width="1.5" opacity="0.15"/>
    <line x1="-42.3" y1="58.2" x2="-68.5" y2="-22.2" stroke="#4f8ff7" stroke-width="1.5" opacity="0.15"/>
    <line x1="-68.5" y1="-22.2" x2="0" y2="-72" stroke="#4f8ff7" stroke-width="1.5" opacity="0.15"/>

    <!-- Center dot — the "pot" -->
    <circle cx="0" cy="0" r="6" fill="#3ecf8e" opacity="0.9"/>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(240, 0)">
    <!-- "Agent" -->
    <text x="0" y="108" font-family="Inter, -apple-system, sans-serif" font-size="64" font-weight="300" fill="#9494a0" letter-spacing="-2">Agent</text>
    <!-- "Circles" -->
    <text x="235" y="108" font-family="Inter, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#ededef" letter-spacing="-2">Circles</text>
    <!-- Tagline -->
    <text x="2" y="142" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#62626e" letter-spacing="3.5">ON-CHAIN ROTATING SAVINGS</text>
  </g>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="arc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f8ff7"/>
      <stop offset="100%" stop-color="#9580ff"/>
    </linearGradient>
  </defs>
</svg>
