# fly.io — agent-circles-api (deploy from repository root so Dockerfile.api can COPY contracts + backend)
app = "agent-circles-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.api"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
